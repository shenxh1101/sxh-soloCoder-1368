# 恶意软件行为分析器配置文件

sandbox:
  # Docker 镜像名称
  image: "malware-sandbox:latest"
  # 样本运行时间（秒）
  runtime: 30
  # 内存限制
  memory: "512m"
  # CPU 限制
  cpu: 1.0
  # 是否启用网络
  network_enabled: true
  # 挂载卷
  volumes: []

yara:
  # YARA 规则目录
  rules_dir: "rules"
  # 是否递归扫描子目录
  recursive: true
  # 扫描超时时间（秒）
  timeout: 60

virustotal:
  # 是否启用 VirusTotal 查询
  enabled: false
  # VirusTotal API Key
  api_key: ""

report:
  # 报告输出目录
  output_dir: "reports"
  # 报告格式: html 或 markdown
  format: "html"
  # 是否包含行为关系图
  include_graphs: true
  # 是否高亮可疑操作
  highlight_suspicious: true

# 临时文件目录
temp_dir: "temp"

# 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level: "INFO"
